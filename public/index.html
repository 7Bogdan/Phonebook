<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Phonebook</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css" integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="style.css" />
</head>
<body>

 <header>
  <nav class="navbar fixed-top navbar-expand-lg navbar-light bg-light">

  <a class="navbar-brand" href="#">Phonebook </a>
  <div class="collapse navbar-collapse" id="navbarSupportedContent">
   <ul class="navbar-nav mr-auto">

    <li class="nav-item">
     <div class="nav-link"> Sort by: </div>
    </li>

    <li class="nav-item">
     <a class="nav-link" href="#">  name </a>
    </li>

    <li class="nav-item">
     <a class="nav-link" href="#"> surname </a>
    </li>

    <li class="nav-item">
     <a class="nav-link" href="#">  city </a>
    </li>
   </ul>
  </div>

  <form class="form-inline ">
   <input class="form-control  mr-sm-2" type="search" placeholder="Search" aria-label="Search">
   <button class="btn btn-secondary my-2 my-sm-0" type="submit">Search</button>
  </form>

 </nav>
</header>

<div class="container-fluid">
  <div class="row">

  <div class="phonebook position-fixed col-lg-3 ">
    <h2 class="display-5">Your personal Phonebook</h2>
      <form name="userForm" id="addUser">
        <input type="hidden" name="id" value="0" />

        <div class="form-group">
         <label for="name">Name:</label>
         <input class="form-control" name="name" />
        </div>

        <div class="form-group">
         <label for="surname">Surname:</label>
         <input class="form-control" name="surname" />
        </div>

        <div class="form-group">
         <label for="telephoneNumber">Telephone Number:</label>
         <input class="form-control" name="telephoneNumber" />
        </div>

        <div class="form-group">
         <label for="city">City:</label>
         <input class="form-control" name="city" />
        </div>

        <div class="form-group">
         <label for="email">Email:</label>
         <input class="form-control" name="email" />
        </div>

        <div class="panel-body">
         <button type="submit" class="btn btn-sm btn-secondary">Сохранить</button>
         <button id="reset" class="btn btn-sm btn-secondary">Сбросить</button>
        </div>

      </form>
    </div>

    <div class=" phonebook col-lg-7">
     <h2 class="display-5 " style="text-align: center">Your contacts</h2>
      <table class="table table-condensed table-hover">
       <thead>
        <tr>
         <th scope="col">Name</th>
         <th scope="col">Surname</th>
         <th scope="col">Number</th>
         <th scope="col">City</th>
         <th scope="col">Email</th>
         <th scope="col"></th>
        </tr>
       </thead>
      <tbody id='table' >
      </tbody>
      </table>
    </div>

  </div>
</div>


 <script src="./app.js"></script>
 <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
 <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js" integrity="sha384-OgVRvuATP1z7JjHLkuOU7Xw704+h835Lr+6QL9UvYjZE3Ipu6Tp75j7Bh/kR0JKI" crossorigin="anonymous"></script>
</body>
</html>
